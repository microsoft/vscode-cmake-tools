# Fix Dependabot PR
#
# Automates rebasing Dependabot dependency-bump PRs and regenerating yarn.lock
# with Azure DevOps cpp_PublicPackages feed URLs.
#
# Usage:
#   1. Go to Actions → "Fix Dependabot PR" → "Run workflow"
#   2. Enter the PR number
#   3. The workflow rebases, regenerates, validates, and pushes
#
# Prerequisites:
#   1. Create a 'dependabot-fix' environment in repo Settings → Environments
#   2. Add AZURE_FEED_PAT as an environment secret (Packaging Read scope, azure-public org)

name: Fix Dependabot PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Dependabot PR number to rebase and fix'
        required: true
        type: number

  # Auto-trigger is disabled. Use workflow_dispatch above.
  # See SECURITY.md for rationale.
  #
  # pull_request_target:
  #   types: [opened, synchronize, reopened]

jobs:
  fix:
    name: Rebase & Regenerate
    runs-on: ubuntu-latest
    # Requires the 'dependabot-fix' environment for secret access.
    # See .github/skills/fix-dependabot/SECURITY.md for details.
    environment: dependabot-fix
    permissions:
      contents: write
      pull-requests: read

    steps:
      # ── Step 1: Identify and validate the PR ──────────────────────────────
      - name: Validate Dependabot PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;
            if (context.eventName === 'workflow_dispatch') {
              prNumber = Number(context.payload.inputs.pr_number);
            } else if (context.eventName === 'pull_request_target') {
              prNumber = context.payload.pull_request.number;
            }

            if (!prNumber) {
              core.setFailed('No PR number available');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            if (pr.user.login !== 'dependabot[bot]') {
              core.setFailed(`PR #${prNumber} is not from Dependabot (author: ${pr.user.login}).`);
              return;
            }

            if (pr.head.repo.full_name !== pr.base.repo.full_name) {
              core.setFailed(`PR #${prNumber} is from a fork.`);
              return;
            }

            if (pr.state !== 'open') {
              core.setFailed(`PR #${prNumber} is ${pr.state}, not open.`);
              return;
            }

            core.setOutput('branch', pr.head.ref);
            core.setOutput('number', String(prNumber));
            core.setOutput('title', pr.title);
            core.setOutput('base', pr.base.ref);
            core.info(`✓ PR #${prNumber}: ${pr.title} (${pr.head.ref} → ${pr.base.ref})`);

      # ── Step 2: Checkout and set up environment ────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn
        run: npm install -g yarn

      # ── Restore trusted .npmrc before any package operations ────────────────
      - name: Restore trusted .npmrc
        env:
          BASE: ${{ steps.pr.outputs.base }}
        run: |
          git checkout "origin/$BASE" -- .npmrc
          echo "✓ .npmrc restored from origin/$BASE (trusted source)"

      # ── Configure Azure feed auth ────────────────────────────────────────
      - name: Configure Azure feed auth
        env:
          AZURE_FEED_PAT: ${{ secrets.AZURE_FEED_PAT }}
        run: |
          if [ -z "$AZURE_FEED_PAT" ]; then
            echo "::error::AZURE_FEED_PAT secret is not configured."
            echo "::error::This workflow requires a PAT with Packaging (Read) scope for the azure-public org."
            exit 1
          fi

          # Append auth tokens to the trusted .npmrc (restored from base branch above)
          echo "//pkgs.dev.azure.com/azure-public/VisualCpp/_packaging/cpp_PublicPackages/npm/registry/:_authToken=${AZURE_FEED_PAT}" >> .npmrc
          echo "//pkgs.dev.azure.com/azure-public/VisualCpp/_packaging/cpp_PublicPackages/npm/:_authToken=${AZURE_FEED_PAT}" >> .npmrc

          echo "✓ Azure feed authentication configured"

      # ── Rebase onto base branch ──────────────────────────────────────────
      - name: Rebase onto ${{ steps.pr.outputs.base }}
        env:
          BASE: ${{ steps.pr.outputs.base }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "$BASE"

          if git rebase "origin/$BASE"; then
            echo "✓ Rebase completed cleanly"
          else
            # Check which files have conflicts
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "Conflicts in: $CONFLICTS"

            # Only auto-resolve yarn.lock conflicts
            NON_LOCK_CONFLICTS=$(echo "$CONFLICTS" | grep -v '^yarn.lock$' || true)
            if [ -n "$NON_LOCK_CONFLICTS" ]; then
              echo "::error::Rebase has conflicts beyond yarn.lock: $NON_LOCK_CONFLICTS"
              echo "::error::Manual resolution required."
              git rebase --abort
              exit 1
            fi

            # Use base branch's yarn.lock as baseline (preserves unrelated updates)
            echo "Resolving yarn.lock conflict using ${BASE} baseline"
            git checkout "origin/$BASE" -- yarn.lock
            git add yarn.lock
            GIT_EDITOR=true git rebase --continue
            echo "✓ Rebase completed with yarn.lock conflict resolution"
          fi

      # ── Verify only expected files changed ────────────────────────────────
      - name: Verify package.json changes
        env:
          BASE: ${{ steps.pr.outputs.base }}
        run: |
          echo "Files changed vs origin/$BASE:"
          git diff --name-only "origin/$BASE"

          # Check for unexpected file changes
          UNEXPECTED=$(git diff --name-only "origin/$BASE" | grep -v '^package.json$' | grep -v '^yarn.lock$' || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Dependabot PR changes files beyond package.json/yarn.lock: $UNEXPECTED"
            echo "::error::This is unusual for a dependency bump. Manual review required."
            exit 1
          fi

          echo "✓ Only package.json and yarn.lock changed"

      # ── Validate package.json fields ─────────────────────────────────────
      - name: Validate package.json safety
        env:
          BASE: ${{ steps.pr.outputs.base }}
        run: |
          # Get the diff of package.json only
          DIFF=$(git diff "origin/$BASE" -- package.json)

          if [ -z "$DIFF" ]; then
            echo "::error::package.json has no changes — nothing for Dependabot to bump"
            exit 1
          fi

          # Check that only safe fields changed (version numbers in deps)
          # Flag changes to: scripts, resolutions, packageManager, main, bin, etc.
          DANGEROUS_FIELDS="scripts\|resolutions\|packageManager\|bin\|main\|module\|types\|exports\|publishConfig"
          DANGEROUS_CHANGES=$(echo "$DIFF" | grep '^[+-]' | grep -v '^[+-][+-][+-]' | grep -i "$DANGEROUS_FIELDS" || true)

          if [ -n "$DANGEROUS_CHANGES" ]; then
            echo "::error::package.json has changes to potentially dangerous fields:"
            echo "$DANGEROUS_CHANGES"
            echo "::error::Manual review required — refusing to auto-process."
            exit 1
          fi

          echo "✓ package.json changes are limited to dependency version fields"

      # ── Regenerate yarn.lock ─────────────────────────────────────────────
      - name: Regenerate yarn.lock
        run: |
          yarn install --ignore-scripts
          echo "✓ yarn.lock regenerated"

      # ── Restore .npmrc (remove auth lines before committing) ────────────
      - name: Restore .npmrc
        env:
          BASE: ${{ steps.pr.outputs.base }}
        run: |
          # Re-restore from base branch to remove any auth lines added earlier
          git checkout "origin/$BASE" -- .npmrc
          echo "✓ .npmrc restored to clean state from origin/$BASE"

      # ── Validate yarn.lock ───────────────────────────────────────────────
      - name: Validate resolved URLs
        run: |
          TOTAL=$(grep -c '^  resolved ' yarn.lock)
          AZURE=$(grep -c 'resolved "https://pkgs.dev.azure.com/azure-public/VisualCpp/' yarn.lock)

          echo "Total resolved URLs: $TOTAL"
          echo "Azure feed URLs:     $AZURE"

          if [ "$TOTAL" -ne "$AZURE" ]; then
            echo ""
            echo "::error::Non-Azure URLs found in yarn.lock:"
            grep '^  resolved ' yarn.lock | grep -v 'pkgs.dev.azure.com/azure-public/VisualCpp/' || true
            exit 1
          fi

          echo "✓ All $TOTAL resolved URLs point to Azure feed"

      - name: Validate integrity hashes
        run: |
          RESOLVED=$(grep -c '^  resolved ' yarn.lock)
          INTEGRITY=$(grep -c '^  integrity ' yarn.lock)

          if [ "$RESOLVED" -ne "$INTEGRITY" ]; then
            echo "::error::Missing integrity hashes — resolved=$RESOLVED but integrity=$INTEGRITY"
            exit 1
          fi

          echo "✓ All $RESOLVED entries have integrity hashes"

      # CI handles testing post-push.

      # ── Commit and push ────────────────────────────────────────────────────
      - name: Commit and push
        env:
          BRANCH: ${{ steps.pr.outputs.branch }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          BASE: ${{ steps.pr.outputs.base }}
        run: |
          # Stage only expected files
          git add package.json yarn.lock

          # Block unexpected files from being staged
          UNEXPECTED=$(git diff --cached --name-only | grep -v '^package.json$' | grep -v '^yarn.lock$' || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Unexpected files staged: $UNEXPECTED"
            exit 1
          fi

          # If no changes, we're done
          if git diff --cached --quiet; then
            echo "✓ No changes needed — yarn.lock is already up to date"
            exit 0
          fi

          git commit -m "chore: rebase and regenerate yarn.lock for PR #${PR_NUMBER}

          Rebased Dependabot branch onto ${BASE} and regenerated yarn.lock
          with Azure DevOps cpp_PublicPackages feed URLs.

          PR: #${PR_NUMBER} (${PR_TITLE})

          Co-authored-by: dependabot[bot] <49699333+dependabot[bot]@users.noreply.github.com>"

          # Re-fetch to ensure our lease basis is current
          git fetch origin "$BRANCH"
          git push --force-with-lease

          echo "✓ Pushed updated branch: $BRANCH"

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          BRANCH: ${{ steps.pr.outputs.branch }}
          BASE: ${{ steps.pr.outputs.base }}
        run: |
          {
            echo "## Fix Dependabot PR"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| **PR** | #${PR_NUMBER} — ${PR_TITLE} |"
            echo "| **Branch** | \`${BRANCH}\` → \`${BASE}\` |"
            echo "| **Registry** | Azure DevOps cpp_PublicPackages |"
            echo "| **Status** | ${{ job.status }} |"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo "✅ Branch rebased and yarn.lock regenerated with Azure feed URLs."
            else
              echo "❌ Workflow failed — check logs above for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
